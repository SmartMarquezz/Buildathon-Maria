<template>
    <lightning-card title="🤖 AI Case Dashboard">
        <div class="slds-p-around_medium">
            <template if:true={error}>
                <div class="slds-text-color_error slds-m-bottom_small">{error}</div>
            </template>

            <div class="stats-bar">
                <div class="stat-card blue">
                    <div class="stat-number">{totalCases}</div>
                    <div class="stat-label">Total Open Cases</div>
                </div>
                <div class="stat-card red">
                    <div class="stat-number">{highPriorityCases}</div>
                    <div class="stat-label">High Priority Cases</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-number">{todayCases}</div>
                    <div class="stat-label">Cases Created Today</div>
                </div>
            </div>

            <div class="dashboard-container">
                <div class="case-list-panel">
                    <div class="panel-header">
                        <h2 class="panel-title">Open Cases</h2>
                        <lightning-button-icon
                            icon-name="utility:refresh"
                            alternative-text="Refresh"
                            title="Refresh"
                            onclick={handleRefresh}
                        ></lightning-button-icon>
                    </div>

                    <template if:true={isLoading}>
                        <div class="slds-align_absolute-center slds-p-around_large">
                            <lightning-spinner alternative-text="Loading cases" size="medium"></lightning-spinner>
                        </div>
                    </template>

                    <template if:false={isLoading}>
                        <template if:true={hasCases}>
                            <template for:each={cases} for:item="caseItem">
                                <div
                                    key={caseItem.Id}
                                    class={caseItem.cardClass}
                                    data-case-id={caseItem.Id}
                                    onclick={handleCaseSelect}
                                >
                                    <div class="case-number">{caseItem.CaseNumber}</div>
                                    <div class="case-subject">{caseItem.Subject}</div>
                                    <div class="case-contact">{caseItem.contactDisplayName}</div>
                                    <div class="case-badges">
                                        <span class={caseItem.priorityBadgeClass}>{caseItem.Priority}</span>
                                        <span class="badge badge-status">{caseItem.Status}</span>
                                    </div>
                                    <div class="case-time">{caseItem.relativeTime}</div>
                                </div>
                            </template>
                        </template>
                        <template if:false={hasCases}>
                            <div class="empty-state">No open cases found.</div>
                        </template>
                    </template>
                </div>

                <div class="ai-panel">
                    <template if:false={hasSelectedCase}>
                        <div class="placeholder-state">
                            <lightning-icon icon-name="utility:einstein" size="large"></lightning-icon>
                            <p>Select a case to generate AI insights</p>
                        </div>
                    </template>

                    <template if:true={hasSelectedCase}>
                        <div class="selected-case-header">
                            <div class="case-number">{selectedCase.CaseNumber}</div>
                            <div class="case-subject">{selectedCase.Subject}</div>
                            <div class="case-badges">
                                <span class={selectedPriorityBadgeClass}>{selectedCase.Priority}</span>
                                <span class="badge badge-status">{selectedCase.Status}</span>
                            </div>
                        </div>

                        <lightning-button
                            label="✨ Generate AI Summary"
                            variant="brand"
                            onclick={handleGenerateSummary}
                            disabled={isGenerateDisabled}
                            class="slds-m-bottom_medium"
                        ></lightning-button>

                        <template if:true={isGenerating}>
                            <div class="generating-state slds-align_absolute-center slds-p-around_medium">
                                <lightning-spinner alternative-text="Generating" size="small"></lightning-spinner>
                                <p>Einstein is analyzing your case...</p>
                            </div>
                        </template>

                        <template if:true={hasAIResult}>
                            <div class="ai-result-card summary">
                                <div class="ai-card-label">📋 Summary</div>
                                <p>{aiResult.summary}</p>
                            </div>

                            <span class={sentimentClass}>{aiResult.sentiment}</span>

                            <div class="ai-result-card priority">
                                <div class="ai-card-label">⚡ Priority Assessment</div>
                                <p>{aiResult.priorityAssessment}</p>
                            </div>

                            <div class="ai-result-card reply">
                                <div class="ai-card-label">✉️ Suggested Reply</div>
                                <div class="reply-box">{aiResult.suggestedReply}</div>
                                <lightning-button
                                    label="Copy Reply"
                                    variant="neutral"
                                    onclick={handleCopyReply}
                                    class="slds-m-top_small"
                                ></lightning-button>
                            </div>

                            <div class="ai-result-card nba">
                                <div class="ai-card-label nba-label">🎯 Next Best Action</div>
                                <p>{aiResult.nextBestAction}</p>
                            </div>
                        </template>
                    </template>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
